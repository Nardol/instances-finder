name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release_metadata.outputs.prerelease }}
    env:
      TAG_NAME: ${{ forgejo.ref_name }}

    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag is on main
        if: forgejo.event_name == 'push'
        run: git merge-base --is-ancestor "$FORGEJO_SHA" origin/main

      - name: Validate release tag
        if: forgejo.event_name == 'push'
        id: release_metadata
        run: |
          python3 - <<'PY'
          import os
          import re

          tag = os.environ["TAG_NAME"]
          semver = re.compile(
              r"^v(?:0|[1-9]\d*)\."
              r"(?:0|[1-9]\d*)\."
              r"(?:0|[1-9]\d*)"
              r"(?P<prerelease>-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)"
              r"(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?"
              r"(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$"
          )
          match = semver.fullmatch(tag)
          if match is None:
              raise SystemExit(f"Invalid SemVer release tag: {tag}")

          prerelease = "true" if match.group("prerelease") else "false"
          with open(os.environ["FORGEJO_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"prerelease={prerelease}", file=output)
          PY

      - name: Set up Node.js
        uses: https://data.forgejo.org/actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: https://github.com/dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> target
            xtask -> target

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            mingw-w64 \
            nsis \
            zip

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Prepare Tauri frontend stub
        run: |
          mkdir -p dist
          test -f dist/index.html || echo "<!doctype html><title>stub</title>" > dist/index.html

      - name: Build xtask
        run: cargo build --manifest-path xtask/Cargo.toml --release

      - name: Run repository checks
        run: ./xtask/target/release/xtask ci-checks-par

      - name: Build Linux packages
        run: ./xtask/target/release/xtask build linux

      - name: Build Windows portable archive
        run: npm run cross:build:win:zip

      - name: Build Windows NSIS installer
        run: npm run cross:build:win:nsis

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -exec cp '{}' release-assets/ \;
          find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -exec cp '{}' release-assets/ \;
          find src-tauri/target/x86_64-pc-windows-gnu/release/bundle -type f \( -name '*.zip' -o -name '*-setup.exe' \) -exec cp '{}' release-assets/ \;
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -ge 4
          (cd release-assets && sha256sum -- * > SHA256SUMS)

      - name: Prepare release notes
        run: sed "s/<VERSION>/${TAG_NAME}/g" .forgejo/release-notes.md > release-notes.txt

      - name: Upload release build
        uses: https://data.forgejo.org/forgejo/upload-artifact@cb8afe72b42edc798abfb8fcb556cf660d894245 # v5
        with:
          name: release-build
          path: |
            release-assets
            release-notes.txt
          if-no-files-found: error

  publish:
    name: publish
    if: forgejo.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      API_URL: ${{ forgejo.api_url }}
      REPOSITORY: ${{ forgejo.repository }}
      TAG_NAME: ${{ forgejo.ref_name }}

    steps:
      - name: Install publishing dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ca-certificates curl jq

      - name: Download release build
        uses: https://data.forgejo.org/forgejo/download-artifact@1314311ddb542af343a82d478ac786ceada4143a # v5
        with:
          name: release-build

      - name: Create draft Forgejo release
        id: create_release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          PRERELEASE: ${{ needs.build.outputs.prerelease }}
        run: |
          set -euo pipefail

          status="$(curl --silent --show-error \
            --output release-response.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer ${FORGEJO_TOKEN}" \
            "${API_URL}/repos/${REPOSITORY}/releases/tags/${TAG_NAME}")"

          if [[ "${status}" == "200" ]]; then
            if [[ "$(jq -r '.draft' release-response.json)" != "true" ]]; then
              echo "Release ${TAG_NAME} is already published." >&2
              exit 1
            fi
            release_id="$(jq -r '.id' release-response.json)"
            while IFS= read -r asset_id; do
              curl --fail-with-body --silent --show-error \
                --request DELETE \
                --header "Authorization: Bearer ${FORGEJO_TOKEN}" \
                "${API_URL}/repos/${REPOSITORY}/releases/${release_id}/assets/${asset_id}"
            done < <(jq -r '.assets[]?.id' release-response.json)
          elif [[ "${status}" == "404" ]]; then
            jq -n \
              --arg tag "${TAG_NAME}" \
              --arg name "${TAG_NAME}" \
              --rawfile body release-notes.txt \
              --argjson prerelease "${PRERELEASE}" \
              '{tag_name: $tag, name: $name, body: $body, draft: true, prerelease: $prerelease}' \
              > release.json

            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${FORGEJO_TOKEN}" \
              --header "Content-Type: application/json" \
              --data @release.json \
              "${API_URL}/repos/${REPOSITORY}/releases" > release-response.json
            release_id="$(jq -r '.id' release-response.json)"
          else
            cat release-response.json >&2
            echo "Could not inspect release ${TAG_NAME}: HTTP ${status}" >&2
            exit 1
          fi

          test "${release_id}" != "null"
          echo "release_id=${release_id}" >> "${FORGEJO_OUTPUT}"

      - name: Upload release assets
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
        run: |
          set -euo pipefail
          for asset in release-assets/*; do
            asset_name="$(basename "${asset}")"
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${FORGEJO_TOKEN}" \
              --form "attachment=@${asset}" \
              --url-query "name=${asset_name}" \
              "${API_URL}/repos/${REPOSITORY}/releases/${RELEASE_ID}/assets"
          done

      - name: Publish Forgejo release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer ${FORGEJO_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"draft":false}' \
            "${API_URL}/repos/${REPOSITORY}/releases/${RELEASE_ID}"
